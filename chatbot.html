<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownScrolled AI ChatBot</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .bot-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .bot-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .bot-header .back-btn {
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .bot-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-color), #a259ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 0 15px rgba(29, 155, 240, 0.3);
        }

        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        .messages-box::-webkit-scrollbar { display: none; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bg-accent);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--brand-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-wrapper {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 8px 18px;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--brand-color);
        }

        #bot-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            padding: 8px 0;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--brand-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.1);
        }

        .typing-indicator {
            align-self: flex-start;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bot-container">
        <header class="bot-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="bot-info">
                <div class="bot-avatar">
                   <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <div style="font-weight: 700; color: white;">Deep AI Assistant</div>
                    <div style="font-size: 0.8rem; color: #00ba7c;">Online</div>
                </div>
            </div>
        </header>

        <div class="messages-box" id="messages-box">
            <div class="message bot">
                Hello! I am your DownScrolled AI Assistant. How can I help you today?
            </div>
        </div>

        <div class="typing-indicator" id="typing">AI is typing...</div>

        <div class="chat-input-wrapper">
            <div class="input-container">
                <input type="text" id="bot-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="assets/js/ai-service.js" type="module"></script>
    <script src="assets/js/chatbot.js" type="module"></script>
</body>
</html>
